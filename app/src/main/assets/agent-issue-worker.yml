# Managed by MIA — do not edit by hand.
# When an issue is labeled "by-agent", let the Gemini CLI attempt the task by editing
# files, gate the result on the Gradle build, then push and relabel the issue "done".
name: Agent Issue Worker

on:
  issues:
    types: [labeled]

# Serialize agent runs so two issues can't push to the default branch at the same time.
concurrency:
  group: agent-worker
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  work:
    # Only react to the label MIA uses; every other labeling event is ignored.
    if: github.event.label.name == 'by-agent'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      # Issue title/body are untrusted user input — keep them in env vars and never
      # interpolate them straight into a shell/YAML expression (command injection).
      ISSUE_TITLE: ${{ github.event.issue.title }}
      ISSUE_BODY: ${{ github.event.issue.body }}
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Build the prompt
        run: |
          {
            echo "You are an autonomous coding agent working inside a GitHub Actions runner."
            echo "Complete the following GitHub issue by editing files in the working tree."
            echo "Do NOT run any git commands, do NOT push, and do NOT open pull requests —"
            echo "the workflow commits and pushes your changes for you afterwards."
            echo "Make the smallest correct change that resolves the issue and keep the project building."
            echo
            echo "Issue #${ISSUE_NUMBER}"
            echo "Title: ${ISSUE_TITLE}"
            echo "Body:"
            echo "${ISSUE_BODY}"
          } > "${RUNNER_TEMP}/agent-prompt.txt"

      # Pin the model for every call that honours it. IMPORTANT: this does NOT stop
      # Gemini CLI's "intelligent model routing" from firing its own classifier requests
      # against a preview model (gemini-3.5-flash, ~20 generateContent/day on the free
      # tier) — that is the "limit: 20, model: gemini-3.5-flash" 429 you may see. The old
      # `experimental.useModelRouter: false` switch was REMOVED from the CLI in Nov 2025
      # (google-gemini/gemini-cli#13593), so there is no supported way to fully disable
      # routing on current releases; -m / GEMINI_MODEL / model.name only pin the *main*
      # model. For a multi-turn coding agent the durable fix is to enable billing on the
      # GEMINI_API_KEY project (removes the free-tier daily caps). The "Run Gemini CLI"
      # step below degrades cleanly when the daily quota is hit instead of failing the
      # job with a cryptic crash.
      - name: Configure Gemini CLI (pin model)
        env:
          # Override with a GEMINI_MODEL repo/environment variable; gemini-2.5-flash-lite
          # has a higher free-tier request cap at some quality cost.
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
        run: |
          mkdir -p "$HOME/.gemini"
          cat > "$HOME/.gemini/settings.json" <<EOF
          {
            "model": {
              "name": "${GEMINI_MODEL}"
            }
          }
          EOF
          echo "Pinned Gemini model to: ${GEMINI_MODEL}"

      - name: Run Gemini CLI
        id: agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # CI runners are non-interactive, so the CLI can't prompt to "trust" the
          # checked-out folder; without this it downgrades --yolo and aborts (exit 55).
          GEMINI_CLI_TRUST_WORKSPACE: "true"
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
        run: |
          set -o pipefail
          # Run without letting `bash -e` abort on a non-zero exit, so the reporting steps
          # can tell an ordinary failure apart from free-tier quota exhaustion (HTTP 429).
          log="${RUNNER_TEMP}/gemini-output.log"
          if gemini --yolo --skip-trust -m "$GEMINI_MODEL" \
               -p "$(cat "${RUNNER_TEMP}/agent-prompt.txt")" 2>&1 | tee "$log"; then
            echo "status=ok" >> "$GITHUB_OUTPUT"
          elif grep -qiE 'quota|exhausted|resource_exhausted|429' "$log"; then
            echo "status=quota" >> "$GITHUB_OUTPUT"
          else
            echo "status=error" >> "$GITHUB_OUTPUT"
          fi

      # Free-tier quota exhaustion is expected, not a bug: comment and let the job pass
      # green so the run history isn't a wall of red. The user re-triggers by re-labeling.
      - name: Report Gemini quota exhaustion
        if: steps.agent.outputs.status == 'quota'
        run: |
          gh issue comment "$ISSUE_NUMBER" --body $'⏳ The agent could not finish: the Gemini API free-tier daily quota is exhausted (HTTP 429).\n\nFree-tier keys are capped at a few requests per day, and the CLI model router also spends part of that budget on gemini-3.5-flash (limit 20/day), so an autonomous multi-step run can exhaust it quickly.\n\nTo fix: enable billing on the Google Cloud / AI Studio project behind GEMINI_API_KEY, or wait for the daily quota to reset — then remove and re-add the by-agent label to try again.'

      - name: Report unexpected agent failure
        if: steps.agent.outputs.status == 'error'
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --body "🛑 The Gemini agent exited with an error before making changes. See the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          exit 1

      - name: Verify build (Gradle)
        id: build
        if: steps.agent.outputs.status == 'ok'
        run: |
          if [ -x ./gradlew ] || [ -f ./gradlew ]; then
            chmod +x ./gradlew
            if ! ./gradlew assembleDebug --stacktrace; then
              echo "failed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No Gradle wrapper found; skipping build gate."
          fi

      - name: Comment on build failure
        if: steps.build.outputs.failed == 'true'
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --body "🛑 The agent produced changes but \`./gradlew assembleDebug\` failed, so nothing was pushed. See the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."

      - name: Fail the job when the build gate failed
        if: steps.build.outputs.failed == 'true'
        run: exit 1

      - name: Commit, push and relabel
        if: steps.agent.outputs.status == 'ok'
        run: |
          git config user.name "gemini-agent[bot]"
          git config user.email "gemini-agent[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            gh issue comment "$ISSUE_NUMBER" \
              --body "ℹ️ The agent ran but produced no file changes for this issue. Leaving it open for a human to review."
            exit 0
          fi
          git commit -m "gemini-agent: resolve #${ISSUE_NUMBER} — ${ISSUE_TITLE}"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
          COMMIT_SHA="$(git rev-parse HEAD)"
          gh issue edit "$ISSUE_NUMBER" --remove-label "by-agent" --add-label "done"
          gh issue comment "$ISSUE_NUMBER" \
            --body "✅ Resolved by the Gemini agent in \`${COMMIT_SHA}\` and pushed to \`${{ github.event.repository.default_branch }}\`."
