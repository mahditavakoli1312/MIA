# Managed by MIA — do not edit by hand.
# When an issue is labeled "by-agent", let the OpenCode CLI attempt the task by editing
# files, gate the result on the Gradle build, then push and relabel the issue "done".
#
# This replaces the old Gemini CLI runner: OpenCode drives a free OpenRouter model, so the
# agent runs on a free-to-obtain OpenRouter API key instead of a rate-capped Gemini key.
name: Agent Issue Worker

on:
  issues:
    types: [labeled]

# Serialize agent runs so two issues can't push to the default branch at the same time.
concurrency:
  group: agent-worker
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  work:
    # Only react to the label MIA uses; every other labeling event is ignored.
    if: github.event.label.name == 'by-agent'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      # Issue title/body are untrusted user input — keep them in env vars and never
      # interpolate them straight into a shell/YAML expression (command injection).
      ISSUE_TITLE: ${{ github.event.issue.title }}
      ISSUE_BODY: ${{ github.event.issue.body }}
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenCode CLI
        run: npm install -g opencode-ai

      - name: Build the prompt
        run: |
          {
            echo "You are an autonomous coding agent working inside a GitHub Actions runner."
            echo "Complete the following GitHub issue by editing files in the working tree."
            echo "Do NOT run any git commands, do NOT push, and do NOT open pull requests —"
            echo "the workflow commits and pushes your changes for you afterwards."
            echo "Make the smallest correct change that resolves the issue and keep the project building."
            echo
            echo "Issue #${ISSUE_NUMBER}"
            echo "Title: ${ISSUE_TITLE}"
            echo "Body:"
            echo "${ISSUE_BODY}"
          } > "${RUNNER_TEMP}/agent-prompt.txt"

      # OpenCode picks up the OpenRouter key from OPENROUTER_API_KEY automatically, so no
      # interactive `opencode auth login` is needed. Models are addressed as "provider/model"
      # and OpenCode splits on the FIRST "/", so `openrouter/openai/gpt-oss-120b:free` means
      # provider=openrouter, model=openai/gpt-oss-120b:free.
      #
      # Free OpenRouter models rotate and are capped (~200 requests/day, ~20/min), which an
      # autonomous multi-step run can exhaust. Override the default with an AGENT_MODEL
      # repo/environment variable pointing at any model your key can reach — another `:free`
      # coding model, or a paid one once you add credit. The step below degrades cleanly on
      # a 429 instead of failing the job with a red run.
      - name: Run OpenCode CLI
        id: agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AGENT_MODEL: ${{ vars.AGENT_MODEL || 'openrouter/openai/gpt-oss-120b:free' }}
        run: |
          set -o pipefail
          # Without a key OpenCode can't reach any model; report it as its own state so the
          # user gets an actionable comment instead of a cryptic provider error.
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "status=nokey" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          log="${RUNNER_TEMP}/opencode-output.log"
          # `run` is the non-interactive mode; --auto auto-approves the file edits the agent
          # proposes so there's no TUI/permission prompt to hang the runner.
          if opencode run --auto -m "$AGENT_MODEL" \
               "$(cat "${RUNNER_TEMP}/agent-prompt.txt")" 2>&1 | tee "$log"; then
            echo "status=ok" >> "$GITHUB_OUTPUT"
          elif grep -qiE '429|rate.?limit|quota|exhausted|too many requests|insufficient' "$log"; then
            echo "status=quota" >> "$GITHUB_OUTPUT"
          else
            echo "status=error" >> "$GITHUB_OUTPUT"
          fi

      - name: Report missing OpenRouter key
        if: steps.agent.outputs.status == 'nokey'
        run: |
          gh issue comment "$ISSUE_NUMBER" --body $'🔑 The agent could not run: no `OPENROUTER_API_KEY` Actions secret is set.\n\nAdd a (free) OpenRouter API key in the MIA app Settings, or add it in the repository Settings → Secrets and variables → Actions as `OPENROUTER_API_KEY`, then remove and re-add the by-agent label to try again.'
          exit 1

      # Free-tier rate/quota exhaustion is expected, not a bug: comment and let the job pass
      # green so the run history isn't a wall of red. The user re-triggers by re-labeling.
      - name: Report quota exhaustion
        if: steps.agent.outputs.status == 'quota'
        run: |
          gh issue comment "$ISSUE_NUMBER" --body $'⏳ The agent could not finish: the OpenRouter free-tier quota/rate limit was hit (HTTP 429).\n\nFree models are capped (roughly 200 requests/day and 20/min), which an autonomous multi-step run can burn through quickly.\n\nTo fix: wait for the quota to reset, point the AGENT_MODEL variable at another free model, or add credit to your OpenRouter account — then remove and re-add the by-agent label to try again.'

      - name: Report unexpected agent failure
        if: steps.agent.outputs.status == 'error'
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --body "🛑 The OpenCode agent exited with an error before making usable changes. See the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          exit 1

      - name: Verify build (Gradle)
        id: build
        if: steps.agent.outputs.status == 'ok'
        run: |
          if [ -x ./gradlew ] || [ -f ./gradlew ]; then
            chmod +x ./gradlew
            if ! ./gradlew assembleDebug --stacktrace; then
              echo "failed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No Gradle wrapper found; skipping build gate."
          fi

      - name: Comment on build failure
        if: steps.build.outputs.failed == 'true'
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --body "🛑 The agent produced changes but \`./gradlew assembleDebug\` failed, so nothing was pushed. See the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."

      - name: Fail the job when the build gate failed
        if: steps.build.outputs.failed == 'true'
        run: exit 1

      - name: Commit, push and relabel
        if: steps.agent.outputs.status == 'ok'
        run: |
          # OpenCode keeps session state under $HOME, but drop any stray in-repo artifacts
          # so they can't leak into the commit.
          rm -rf .opencode
          git config user.name "mia-agent[bot]"
          git config user.email "mia-agent[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            gh issue comment "$ISSUE_NUMBER" \
              --body "ℹ️ The agent ran but produced no file changes for this issue. Leaving it open for a human to review."
            exit 0
          fi
          git commit -m "mia-agent: resolve #${ISSUE_NUMBER} — ${ISSUE_TITLE}"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
          COMMIT_SHA="$(git rev-parse HEAD)"
          gh issue edit "$ISSUE_NUMBER" --remove-label "by-agent" --add-label "done"
          gh issue comment "$ISSUE_NUMBER" \
            --body "✅ Resolved by the OpenCode agent in \`${COMMIT_SHA}\` and pushed to \`${{ github.event.repository.default_branch }}\`."
